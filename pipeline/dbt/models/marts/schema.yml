version: 2

models:
  - name: fct_events
    description: >
      Core event fact table. One row per event, cleaned and typed.
      Currently a pass-through from staging; business logic gets added here.
    columns:
      - name: event_id
        description: Unique event identifier from PostHog
        tests:
          - unique
          - not_null
      - name: event_name
        description: "Event type (e.g. $pageview, $autocapture, or custom events)"
        tests:
          - not_null
      - name: visitor_id
        description: PostHog distinct_id identifying the visitor
      - name: event_timestamp
        description: When the event occurred
        tests:
          - not_null

  - name: dim_visitors
    description: >
      Visitor dimension table. One row per distinct visitor with first/last seen,
      session counts, and latest device/geo attributes.
    columns:
      - name: visitor_id
        description: PostHog distinct_id
        tests:
          - unique
          - not_null
      - name: first_seen_at
        description: Timestamp of visitor's earliest event
      - name: last_seen_at
        description: Timestamp of visitor's most recent event
      - name: total_events
        description: Lifetime event count for this visitor
      - name: total_sessions
        description: Lifetime session count for this visitor
      - name: active_days
        description: Number of distinct calendar days with activity

  - name: metrics_daily
    description: >
      Daily aggregate metrics for the analytics page. One row per day.
      Powers the site's self-referential dashboards.
    columns:
      - name: metric_date
        description: Calendar date
        tests:
          - unique
          - not_null
      - name: total_events
        description: Total events that day
      - name: unique_visitors
        description: Distinct visitors that day
      - name: unique_sessions
        description: Distinct sessions that day
      - name: pageviews
        description: Count of $pageview events
      - name: clicks
        description: Count of $autocapture (click) events
      - name: events_per_visitor
        description: Average events per visitor that day
      - name: pages_per_session
        description: Average pageviews per session that day
      - name: click_through_rate
        description: Ratio of clicks to pageviews
      - name: total_purchases
        description: Count of completed purchases that day
      - name: total_revenue
        description: Sum of purchase amounts (USD) that day

  - name: fct_purchases
    description: >
      Purchase fact table. One row per completed purchase with item details
      and Stripe session ID. Sourced from purchase_complete events fired by
      the Stripe webhook.
    columns:
      - name: event_id
        description: Unique event identifier from PostHog
        tests:
          - unique
          - not_null
      - name: purchased_at
        description: When the purchase was completed
        tests:
          - not_null
      - name: item_id
        description: "Product identifier (e.g. keep-the-lights-on)"
      - name: item_name
        description: "Human-readable product name"
      - name: price
        description: Purchase amount in USD
      - name: stripe_session_id
        description: Stripe Checkout Session ID for reconciliation

  - name: questionnaire_responses
    description: >
      Questionnaire responses from exhibit visitors. One row per response,
      with the extracted response text. Source for future modeling step.
    columns:
      - name: event_id
        description: Unique event identifier from PostHog
        tests:
          - unique
          - not_null
      - name: visitor_id
        description: PostHog distinct_id of the respondent
      - name: responded_at
        description: When the response was submitted
        tests:
          - not_null
      - name: response_text
        description: Free-text response (max 500 chars)
        tests:
          - not_null

  - name: exhibit_funnel
    description: >
      Exhibit step completion funnel. One row per exhibit step with
      unique visitor counts and completion rate relative to step 1.
    columns:
      - name: step_name
        description: "Exhibit step name (welcome, the-loop, the-warehouse, the-pipeline, the-apparatus)"
        tests:
          - not_null
      - name: step_number
        description: Step order (1-5)
        tests:
          - not_null
      - name: unique_visitors
        description: Count of distinct visitors who reached this step
      - name: completion_rate
        description: Fraction of step-1 visitors who reached this step
