name: dbt build

on:
  schedule:
    - cron: "0 6 * * *"  # 6am UTC daily
  workflow_dispatch:  # manual trigger

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline/dbt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install -r ../../requirements-pipeline.txt

      - name: Write BigQuery credentials
        env:
          BIGQUERY_KEY_JSON: ${{ secrets.BIGQUERY_KEY_JSON }}
        run: echo "$BIGQUERY_KEY_JSON" > /tmp/bq-key.json

      - name: Run dbt build
        run: dbt build --target prod
