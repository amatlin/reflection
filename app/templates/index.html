<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflection</title>
  <link rel="stylesheet" href="/static/style.css?v=4" />
</head>
<body>
  <div class="split">
    <!-- Left: concept -->
    <div class="panel left">
      <div class="left-content">
        <h1>reflection</h1>
        <p class="description">
          <span id="greeting">welcome.</span> stay for a second or for a while.
          every action you take here is recorded and visible to everyone.
        </p>
        <div class="actions">
          <button id="btn-fire" class="btn btn-fire">Fire an event</button>
        </div>
      </div>
      <div class="footer">
        <a href="https://github.com/amatlin/reflection">GitHub</a>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Right: live event stream + journey -->
    <div class="panel right">
      <div class="pipeline-status" id="pipeline-status"></div>
      <div class="tab-bar">
        <button class="tab active" data-tab="stream">
          <span class="dot"></span> Everyone
        </button>
        <button class="tab" data-tab="you">You</button>
      </div>

      <div id="tab-stream" class="tab-content active">
        <div id="stream" class="stream"></div>
      </div>

      <div id="tab-you" class="tab-content">
        <div id="journey-container" class="journey-container">
          <p class="journey-placeholder">Click "Fire an event" to see your data's journey through the pipeline.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Pipeline config -->
  <script>
    window.__reflection = {
      lastExportIso: "{{ last_export_iso }}",
      dbtCronMinute: {{ dbt_cron_minute }}
    };
  </script>

  <!-- PostHog SDK -->
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.crossOrigin="anonymous",p.async=!0,p.src=s.api_host.replace(".i.posthog.com","-assets.i.posthog.com")+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagPayload isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);

    posthog.init("{{ posthog_api_key }}", {
      api_host: "{{ posthog_host }}",
      capture_pageview: true,
      capture_pageleave: true,
      autocapture: true,
      loaded: function(ph) {
        var id = ph.get_distinct_id();
        if (id) {
          var el = document.getElementById("greeting");
          while (el.firstChild) el.removeChild(el.firstChild);
          el.appendChild(document.createTextNode("welcome, visitor "));
          var idSpan = document.createElement("span");
          idSpan.className = "visitor-id";
          idSpan.textContent = id.substring(0, 8);
          el.appendChild(idSpan);
          el.appendChild(document.createTextNode("."));
        }
      },
      _onCapture: function(eventName, eventData) {
        // Forward every captured event to our backend
        var payload = {
          event_type: eventName,
          page_path: window.location.pathname,
          element_id: null,
          element_tag: null,
          element_text: null,
          visitor_id: posthog.get_distinct_id(),
          raw_properties: {}
        };

        // Extract element info from autocapture events
        if (eventData && eventData.properties) {
          var p = eventData.properties;
          if (p.$el_text) payload.element_text = p.$el_text.substring(0, 100);
          if (p.tag_name) payload.element_tag = p.tag_name;
          if (p.$elements && p.$elements.length > 0) {
            var el = p.$elements[0];
            payload.element_id = el.attr_id || null;
            payload.element_tag = payload.element_tag || el.tag_name || null;
          }
        }

        // If this is a fire_event and a journey is pending, resolve "captured"
        // and pass along PostHog properties for the transformation preview
        if (eventName === "fire_event" && window.__pendingJourney) {
          var props = (eventData && eventData.properties) || {};
          window.__pendingJourney.properties = {
            $browser: props.$browser || null,
            $browser_version: props.$browser_version || null,
            $os: props.$os || null,
            $device_type: props.$device_type || null,
            $pathname: window.location.pathname,
            $session_id: props.$session_id || null
          };
          if (window.__pendingJourney.onCapture) {
            window.__pendingJourney.onCapture();
          }
        }

        fetch("/api/events", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        }).then(function(res) {
          return res.json();
        }).then(function(data) {
          // Resolve "stored" step and record event ID for stream matching
          if (window.__pendingJourney && eventName === "fire_event" && data && data.id) {
            window.__pendingJourney.eventId = data.id;
            if (window.__pendingJourney.onStore) {
              window.__pendingJourney.onStore();
            }
            // Check if WS message arrived before this response (race condition)
            var buf = window.__pendingJourney._wsBuffer || [];
            if (buf.indexOf(data.id) !== -1) {
              if (window.__pendingJourney.onStream) {
                window.__pendingJourney.onStream();
              }
            }
          }
        }).catch(function() {});
      }
    });
  </script>

  <script src="/static/stream.js"></script>
</body>
</html>
